        <script>
          const BLOCK_SIZE = window.innerWidth < 768 ? 30 : 40;
          const TETROMINOES = {
            I: { coords: [[0,0], [1,0], [2,0], [3,0]], color: '#007BFF' },
            O: { coords: [[0,0], [1,0], [0,1], [1,1]], color: '#FF3B30' },
            T: { coords: [[1,0], [0,1], [1,1], [2,1]], color: '#FFCC00' },
            L: { coords: [[0,0], [0,1], [0,2], [1,2]], color: '#9C27B0' },
            Z: { coords: [[0,0], [1,0], [1,1], [2,1]], color: '#34C759' }
          };

          let currentMode = 'free';
          let targetW = 0;
          let targetH = 0;
          let activePieces = [];
          let selectedPiece = null;
          let currentLevelTarget = [];
          let targetMinX, targetMaxX, targetMinY, targetMaxY;

          // ===================== 防重叠核心工具函数 =====================
          // 获取方块所有小格子的网格坐标
          function getPieceGridPositions(piece) {
            const positions = [];
            const boardRect = document.getElementById('game-board').getBoundingClientRect();
            const blocks = piece.querySelectorAll('.block');
            
            blocks.forEach(block => {
              const rect = block.getBoundingClientRect();
              const cx = rect.left + rect.width/2 - boardRect.left;
              const cy = rect.top + rect.height/2 - boardRect.top;
              const gx = Math.floor(cx / BLOCK_SIZE);
              const gy = Math.floor(cy / BLOCK_SIZE);
              positions.push({x: gx, y: gy});
            });
            return positions;
          }

          // 检测方块是否与其他方块重叠
          function isOverlapping(currentPiece) {
            if (activePieces.length <= 1) return false;
            const currentPos = getPieceGridPositions(currentPiece);
            const currentSet = new Set(currentPos.map(p => `${p.x},${p.y}`));

            for (const piece of activePieces) {
              if (piece === currentPiece) continue;
              const piecePos = getPieceGridPositions(piece);
              for (const pos of piecePos) {
                if (currentSet.has(`${pos.x},${pos.y}`)) {
                  return true;
                }
              }
            }
            return false;
          }
          // =================================================================

          function initGrid() {
            const bg = document.getElementById('grid-bg');
            bg.innerHTML = '';
            const cols = Math.ceil(window.innerWidth / BLOCK_SIZE);
            const rows = Math.ceil(window.innerHeight / BLOCK_SIZE);
            for(let i=0; i < cols * rows; i++) {
              const cell = document.createElement('div');
              cell.className = 'grid-cell';
              bg.appendChild(cell);
            }
          }

          function createPiece(type, x, y, isInventory = false) {
            const data = TETROMINOES[type];
            const el = document.createElement('div');
            el.className = 'tetromino';
            el.dataset.type = type;
            el.dataset.rotation = 0;
            el.dataset.flipped = &quot;false&quot;;
            
            data.coords.forEach(coord => {
              const b = document.createElement('div');
              b.className = 'block';
              b.style.backgroundColor = data.color;
              b.style.left = coord[0] * BLOCK_SIZE + 'px';
              b.style.top = coord[1] * BLOCK_SIZE + 'px';
              el.appendChild(b);
            });

            if (isInventory) {
              const bounds = data.coords.reduce((acc, c) => ({
                maxX: Math.max(acc.maxX, c[0]),
                maxY: Math.max(acc.maxY, c[1]),
              }), { maxX: 0, maxY: 0 });
              el.style.width = (bounds.maxX + 1) * BLOCK_SIZE + 'px';
              el.style.height = (bounds.maxY + 1) * BLOCK_SIZE + 'px';
              el.style.position = 'relative';
              el.style.transform = 'scale(0.7)';
              return el;
            }

            el.style.left = x + 'px';
            el.style.top = y + 'px';
            
            makeDraggable(el);
            el.addEventListener('mousedown', () => selectPiece(el));
            el.addEventListener('touchstart', () => selectPiece(el));
            
            return el;
          }

          function makeDraggable(el) {
            let offsetX = 0, offsetY = 0;
            let originalX = 0, originalY = 0; // 记录原始位置
            
            el.addEventListener('mousedown', dragStart);
            el.addEventListener('touchstart', dragStart, { passive: false });

            function dragStart(e) {
              e.preventDefault();
              originalX = el.offsetLeft;
              originalY = el.offsetTop;
              const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
              const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
              const rect = el.getBoundingClientRect();
              offsetX = clientX - rect.left;
              offsetY = clientY - rect.top;
              el.isDragging = false;
              
              if (e.type === 'mousedown') {
                document.addEventListener('mousemove', dragMove);
                document.addEventListener('mouseup', dragEnd);
              } else {
                document.addEventListener('touchmove', dragMove, { passive: false });
                document.addEventListener('touchend', dragEnd, { passive: false });
              }
            }

            function dragMove(e) {
              e.preventDefault();
              const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
              const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
              
              if (!el.isDragging) {
                el.isDragging = true;
              }
              
              const board = document.getElementById('game-board');
              const boardRect = board.getBoundingClientRect();
              el.style.left = (clientX - boardRect.left - offsetX) + &quot;px&quot;;
              el.style.top = (clientY - boardRect.top - offsetY) + &quot;px&quot;;
            }

            function dragEnd(e) {
              document.removeEventListener('mousemove', dragMove);
              document.removeEventListener('mouseup', dragEnd);
              document.removeEventListener('touchmove', dragMove);
              document.removeEventListener('touchend', dragEnd);
              
              // ===================== 核心修改：删除单击旋转逻辑 =====================
              
              const snapX = Math.round(el.offsetLeft / BLOCK_SIZE) * BLOCK_SIZE;
              const snapY = Math.round(el.offsetTop / BLOCK_SIZE) * BLOCK_SIZE;
              
              // 临时移动到目标位置，检测重叠
              el.style.left = snapX + 'px';
              el.style.top = snapY + 'px';
              const overlapping = isOverlapping(el);

              if (overlapping) {
                // 重叠：回弹到原始位置
                anime({
                  targets: el,
                  left: originalX,
                  top: originalY,
                  duration: 200,
                  easing: 'easeOutQuad'
                });
              } else {
                // 不重叠：吸附到网格
                anime({
                  targets: el,
                  left: snapX,
                  top: snapY,
                  duration: 200,
                  easing: 'easeOutQuad',
                  complete: checkWin
                });
              }
            }
          }

          function initInventory() {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = '';
            const types = ['I', 'O', 'T', 'L', 'Z'];
            
            types.forEach(type => {
              const item = document.createElement('div');
              item.className = 'inventory-item';
              const piece = createPiece(type, 0, 0, true);
              item.appendChild(piece);
              
              item.addEventListener('mousedown', (e) => startDragFromInventory(e, type));
              item.addEventListener('touchstart', (e) => startDragFromInventory(e, type), { passive: false });
              
              grid.appendChild(item);
            });
          }

          function startDragFromInventory(e, type) {
            e.preventDefault();
            const isTouch = e.type === 'touchstart';
            const clientX = isTouch ? e.touches[0].clientX : e.clientX;
            const clientY = isTouch ? e.touches[0].clientY : e.clientY;
            
            const proxy = createPiece(type, 0, 0);
            proxy.classList.add('drag-proxy');
            document.body.appendChild(proxy);
            
            const moveProxy = (me) => {
              if (me.type === 'touchmove') me.preventDefault();
              const mX = (me.type === 'touchmove' ? me.touches[0].clientX : me.clientX);
              const mY = (me.type === 'touchmove' ? me.touches[0].clientY : me.clientY);
              proxy.style.left = (mX - 20) + 'px';
              proxy.style.top = (mY - 20) + 'px';
            };
            
            const endDrag = (ee) => {
              document.removeEventListener('mousemove', moveProxy);
              document.removeEventListener('touchmove', moveProxy);
              document.removeEventListener('mouseup', endDrag);
              document.removeEventListener('touchend', endDrag);
              
              const eX = (ee.type === 'touchend' ? ee.changedTouches[0].clientX : ee.clientX);
              const eY = (ee.type === 'touchend' ? ee.changedTouches[0].clientY : ee.clientY);
              const board = document.getElementById('game-board');
              const rect = board.getBoundingClientRect();
              
              if (eX >= rect.left && eX <= rect.right && eY >= rect.top && eY <= rect.bottom) {
                const localX = Math.round((eX - rect.left - 20) / BLOCK_SIZE) * BLOCK_SIZE;
                const localY = Math.round((eY - rect.top - 20) / BLOCK_SIZE) * BLOCK_SIZE;
                const newPiece = createPiece(type, localX, localY);
                board.appendChild(newPiece);
                activePieces.push(newPiece);

                // 放置时检测重叠，重叠则删除
                if (isOverlapping(newPiece)) {
                  newPiece.remove();
                  activePieces.pop();
                } else {
                  selectPiece(newPiece);
                  checkWin();
                }
              }
              
              proxy.remove();
            };
            
            if (isTouch) {
              document.addEventListener('touchmove', moveProxy, { passive: false });
              document.addEventListener('touchend', endDrag, { passive: false });
            } else {
              document.addEventListener('mousemove', moveProxy);
              document.addEventListener('mouseup', endDrag);
            }
            
            proxy.style.left = (clientX - 20) + 'px';
            proxy.style.top = (clientY - 20) + 'px';
          }

          function selectPiece(el) {
            if (selectedPiece) selectedPiece.style.filter = 'none';
            selectedPiece = el;
            selectedPiece.style.filter = 'brightness(1.1) drop-shadow(0 0 5px rgba(255,86,0,0.5))';
          }

          function loadLevel() {
            document.getElementById('success-msg').style.display = 'none';
            const board = document.getElementById('game-board');
            const outline = document.getElementById('target-outline');
            
            if (currentMode === 'free') {
              outline.style.display = 'none';
              currentLevelTarget = [];
              targetMinX = targetMaxX = targetMinY = targetMaxY = 0;
              return;
            }
            
            // 限定模式：仅显示5×4方框，无任何限制
            outline.style.display = 'block';
            const rectWidth = 5 * BLOCK_SIZE;
            const rectHeight = 4 * BLOCK_SIZE;
            const offsetX = Math.floor((board.clientWidth - rectWidth) / 2 / BLOCK_SIZE) * BLOCK_SIZE;
            const offsetY = Math.floor((board.clientHeight - rectHeight) / 2 / BLOCK_SIZE) * BLOCK_SIZE;
            
            outline.style.left = offsetX + 'px';
            outline.style.top = offsetY + 'px';
            outline.style.width = rectWidth + 'px';
            outline.style.height = rectHeight + 'px';
          }

          function switchMode(mode) {
            if (currentMode === mode) return;
            currentMode = mode;
            resetGame();
          }

          // ===================== 核心修改：关闭所有胜利判定，功能完全一致 =====================
          function checkWin() {
            // 无胜利判定，限定模式仅作方框提示，功能和自由模式完全相同
            return;
          }

          // 旋转：仅按钮触发
          function rotatePiece(el) {
            if (!el) return;
            const originalRot = el.dataset.rotation;
            const originalX = el.offsetLeft;
            const originalY = el.offsetTop;
            
            let r = (parseInt(originalRot) || 0) + 90;
            el.dataset.rotation = r;
            
            anime({
              targets: el,
              rotate: r,
              duration: 300,
              complete: () => {
                if (isOverlapping(el)) {
                  // 重叠：恢复旋转和位置
                  el.dataset.rotation = originalRot;
                  anime({ targets: el, rotate: originalRot, left: originalX, top: originalY, duration: 200 });
                } else {
                  checkWin();
                }
              }
            });
          }

          // 翻折
          function flipPiece(el) {
            if (!el) return;
            const originalFlip = el.dataset.flipped;
            const originalX = el.offsetLeft;
            const originalY = el.offsetTop;
            
            let isFlipped = originalFlip === &quot;true&quot;;
            el.dataset.flipped = !isFlipped;
            
            anime({
              targets: el,
              scaleX: isFlipped ? 1 : -1,
              duration: 300,
              complete: () => {
                if (isOverlapping(el)) {
                  // 重叠：恢复翻折和位置
                  el.dataset.flipped = originalFlip;
                  anime({ targets: el, scaleX: originalFlip === 'true' ? -1 : 1, left: originalX, top: originalY, duration: 200 });
                } else {
                  checkWin();
                }
              }
            });
          }

          function resetGame() {
            activePieces.forEach(p => p.remove());
            activePieces = [];
            selectedPiece = null;
            loadLevel();
          }

          // 下拉框切换模式事件
          document.getElementById('mode-select').addEventListener('change', (e) => {
            switchMode(e.target.value);
          });
          
          document.getElementById('btn-rotate').onclick = () => rotatePiece(selectedPiece);
          document.getElementById('btn-flip').onclick = () => flipPiece(selectedPiece);
          document.getElementById('btn-reset').onclick = resetGame;

          window.onload = () => {
            initGrid();
            initInventory();
            loadLevel();
          };
          window.onresize = () => {
            initGrid();
            loadLevel();
          };
        </script>
      </body>
      </html>
    " frameborder="0">
    </iframe>
  </div>

  <script>
    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null

      function startTimer() {
        if (!startTime) {
          startTime = Date.now();
        }
      }

      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime;
          startTime = null;
        }
      }

      function isPageVisible() {
        if (document.hidden) return false;
        if (document.visibilityState && document.visibilityState !== 'visible') return false;
        if (!document.hasFocus()) return false;
        return true;
      }

      function reportStayTime(eventType, immediate = false) {
        stopTimer();
        if (reportTimer) clearTimeout(reportTimer);
        if (immediate) {
          doReport(eventType);
          return;
        }
        reportTimer = setTimeout(() => doReport(eventType), 100);
      }

      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {};
          const chatId = serverData.watermarkChatId;
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: { chat_id: chatId, use_time: Math.floor(totalTime / 1000) },
            duration: Math.floor(totalTime / 1000),
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          });
          totalTime = 0;
        }
      }

      function cleanup() {
        if (reportTimer) clearTimeout(reportTimer);
        document.removeEventListener('visibilitychange', handleVisibilityChange);
        window.removeEventListener('blur', handleBlur);
        window.removeEventListener('focus', handleFocus);
        window.removeEventListener('beforeunload', handleBeforeUnload);
        window.removeEventListener('pagehide', handlePageHide);
        startTime = null;
        totalTime = 0;
      }

      function handleVisibilityChange() {
        document.hidden ? reportStayTime('visibilitychange') : startTimer();
      }
      function handleBlur() { reportStayTime('blur'); }
      function handleFocus() { startTimer(); }
      function handleBeforeUnload() { reportStayTime('beforeunload', true); cleanup(); }
      function handlePageHide() { reportStayTime('pagehide', true); }

      document.addEventListener('visibilitychange', handleVisibilityChange);
      window.addEventListener('blur', handleBlur);
      window.addEventListener('focus', handleFocus);
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', () => { if (isPageVisible()) startTimer(); });
      } else {
        if (isPageVisible()) startTimer();
      }
      window.addEventListener('beforeunload', handleBeforeUnload);
      window.addEventListener('pagehide', handlePageHide);
    })()

    function adjustRem() {
      const pcBaseWidth = 375
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }

    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile();
      if (isMobile) adjustRem();
      const iframeContainer = document.querySelector('.iframe-container');
      if (iframeContainer) {
        isMobile ? iframeContainer.classList.add('mobile') : iframeContainer.classList.remove('mobile');
      }
    }

    function handleResize() {
      checkAndHideButtonOnMobile();
    }

    window.addEventListener('resize', handleResize);
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    window.addEventListener('beforeunload', () => window.removeEventListener('resize', handleResize));

  </script>
